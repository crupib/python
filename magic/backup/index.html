<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MTG Commander Deck Generator</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #282c34; color: white; text-align: center; margin: 20px; }
    .deck-section { margin-top: 30px; text-align: left; width: 80%; margin: auto; padding: 10px; background-color: #333; border-radius: 8px; }
    .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
    .card { background-color: #444; border-radius: 8px; padding: 10px; text-align: center; width: 200px; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2); }
    .card img { width: 100%; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>MTG Commander Deck Generator</h1>
  <div>
    <input type="text" id="userPrompt" placeholder="Enter a deck theme (e.g., 'Sheoldred Commander Deck')">
    <button id="generateButton" onclick="generateDeck()">Generate Deck</button>
  </div>
  <div id="loadingMessage" style="display: none;">Generating deck... Please wait.</div>
  <div id="deck-categories"></div>

  <script>
    function generateDeck() {
      const prompt = document.getElementById("userPrompt").value.trim();
      if (!prompt) {
        alert("Please enter a deck theme.");
        return;
      }
      document.getElementById("generateButton").disabled = true;
      document.getElementById("loadingMessage").style.display = "block";

      fetch("/generate_deck", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: prompt })
      })
      .then(response => response.json())
      .then(data => {
        setTimeout(loadDeck, 5000);
      })
      .catch(error => console.error("Error generating deck:", error));
    }

    function loadDeck() {
      fetch("/deck.json")
      .then(response => response.json())
      .then(data => {
        document.getElementById("loadingMessage").style.display = "none";
        const categoriesContainer = document.getElementById("deck-categories");
        categoriesContainer.innerHTML = "";
        Object.entries(data.categories).forEach(([category, cards]) => {
          let sectionHTML = `<div class="deck-section"><h2>${category}</h2><div class="card-container">`;
          cards.forEach(card => {
            sectionHTML += `
              <div class="card">
                <h3>${card.name} (x${card.quantity})</h3>
                <img src="${card.image}" alt="${card.name}">
              </div>`;
          });
          sectionHTML += `</div></div>`;
          categoriesContainer.innerHTML += sectionHTML;
        });
      })
      .catch(error => console.error("Error loading deck:", error));
    }
  </script>
</body>
</html>
