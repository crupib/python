<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic: The Gathering Commander Deck</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #282c34;
            color: white;
            text-align: center;
            margin: 20px;
        }
        h1 {
            font-size: 24px;
        }
        .input-container {
            margin-bottom: 20px;
        }
        input {
            width: 300px;
            padding: 8px;
            font-size: 16px;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-left: 10px;
        }
        .loading {
            color: yellow;
            font-size: 18px;
            margin-top: 10px;
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background-color: #444;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            width: 200px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }
        .card img {
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Magic: The Gathering Commander Deck Generator</h1>

    <div class="input-container">
        <input type="text" id="userPrompt" placeholder="Enter a deck theme (e.g., 'Angel Commander Deck')">
        <button onclick="generateDeck()">Generate Deck</button>
    </div>

    <p id="loadingMessage" class="loading" style="display: none;">Generating deck... Please wait.</p>

    <h2>Deck List</h2>
    <div id="deck-categories"></div>

    <script>
        function generateDeck() {
            const userPrompt = document.getElementById("userPrompt").value.trim();
            if (!userPrompt) {
                alert("Please enter a deck theme before generating.");
                return;
            }

            document.getElementById("loadingMessage").style.display = "block";

            fetch("/generate_deck", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: userPrompt })
            })
            .then(() => setTimeout(loadDeck, 5000));
        }

        function loadDeck() {
            fetch("/deck.json")
                .then(response => response.json())
                .then(data => {
                    document.getElementById("loadingMessage").style.display = "none";

                    const categoriesContainer = document.getElementById("deck-categories");
                    categoriesContainer.innerHTML = "";

                    Object.keys(data.categories).forEach(category => {
                        let section = `<h2>${category}</h2><div class="card-container">`;
                        data.categories[category].forEach(card => {
                            section += `<div class="card">
                                <h3>${card.name} (x${card.quantity})</h3>
                                <img src="${card.image}" alt="${card.name}">
                                <p>${card.oracle_text}</p>
                            </div>`;
                        });
                        section += "</div>";
                        categoriesContainer.innerHTML += section;
                    });
                });
        }
    </script>

</body>
</html>
